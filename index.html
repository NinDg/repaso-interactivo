<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>AI Study Master - Ultra Fast</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
</head>
<body class="bg-slate-50 min-h-screen p-4">
    <div id="app" class="max-w-2xl mx-auto bg-white shadow-2xl rounded-3xl p-8 mt-10">
        <h1 class="text-2xl font-bold text-center text-indigo-600 mb-8">🎓 Repaso IA</h1>
        
        <div id="setup">
            <input type="file" id="file-input" class="mb-4 block w-full text-sm text-slate-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-indigo-50 file:text-indigo-700 hover:file:bg-indigo-100">
            <button onclick="iniciar()" id="btn-iniciar" class="w-full bg-indigo-600 text-white py-3 rounded-xl font-bold hidden">🚀 Empezar ahora</button>
        </div>

        <div id="game" class="hidden">
            <div id="loading" class="text-center py-10 text-indigo-500 font-bold animate-bounce">🤔 Pensando pregunta...</div>
            <div id="content" class="hidden">
                <p id="pregunta" class="text-xl font-bold mb-6"></p>
                <div id="opciones" class="grid gap-3"></div>
                <button onclick="generar()" class="mt-6 w-full text-indigo-600 font-bold py-2 border-2 border-indigo-600 rounded-xl">Siguiente pregunta ➔</button>
            </div>
        </div>
    </div>

    <script>
        // TU CLAVE YA PUESTA
        const KEY = "AIzaSyAiAbTINe_y2TIZve9Dq2tL9x6gjtnJuU4";
        let textoBase = "";
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';

        document.getElementById('file-input').onchange = async (e) => {
            const file = e.target.files[0];
            if (file.type === "application/pdf") {
                const reader = new FileReader();
                reader.onload = async function() {
                    const pdf = await pdfjsLib.getDocument({data: new Uint8Array(this.result)}).promise;
                    for (let i = 1; i <= Math.min(pdf.numPages, 5); i++) { // Solo 5 pags para ir rápido
                        const page = await pdf.getPage(i);
                        const content = await page.getTextContent();
                        textoBase += content.items.map(s => s.str).join(" ");
                    }
                    document.getElementById('btn-iniciar').classList.remove('hidden');
                };
                reader.readAsArrayBuffer(file);
            } else {
                textoBase = await file.text();
                document.getElementById('btn-iniciar').classList.remove('hidden');
            }
        };

        function iniciar() {
            document.getElementById('setup').classList.add('hidden');
            document.getElementById('game').classList.remove('hidden');
            generar();
        }

        async function generar() {
            document.getElementById('content').classList.add('hidden');
            document.getElementById('loading').classList.remove('hidden');
            
            try {
                const res = await fetch(`https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash:generateContent?key=${KEY}`, {
                    method: "POST",
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: `Basado en: ${textoBase.substring(0, 5000)}. Crea pregunta de 3 opciones. Responde SOLO JSON: {"p":"pregunta","o":["A","B","C"],"c":0}` }] }]
                    })
                });
                
                const data = await res.json();
                const json = JSON.parse(data.candidates[0].content.parts[0].text.replace(/```json|```/g, ""));
                
                document.getElementById('pregunta').innerText = json.p;
                const opts = document.getElementById('opciones');
                opts.innerHTML = "";
                json.o.forEach((o, i) => {
                    const btn = document.createElement('button');
                    btn.className = "p-4 bg-slate-100 rounded-xl hover:bg-indigo-100 text-left transition";
                    btn.innerText = o;
                    btn.onclick = () => alert(i === json.c ? "✅ ¡Correcto!" : "❌ No es correcta");
                    opts.appendChild(btn);
                });
                
                document.getElementById('loading').classList.add('hidden');
                document.getElementById('content').classList.remove('hidden');
            } catch (e) {
                alert("La IA está ocupada. Pulsa OK para reintentar.");
                generar();
            }
        }
    </script>
</body>
</html>
